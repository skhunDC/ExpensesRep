<script>
const state={bootstrap:null,dev:null,session:null,employee:null,month:null};
const $=s=>document.querySelector(s);const view=$('#view');
function run(name,...args){return new Promise((res,rej)=>google.script.run.withSuccessHandler(res).withFailureHandler(e=>rej(e))[name](...args));}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function msg(t,bad=false){return `<div class="msg ${bad?'err':''}">${esc(t)}</div>`}
function options(list,val){return list.map(x=>`<option ${x===val?'selected':''}>${esc(x)}</option>`).join('')}
function boot(){let c=4;$('#countdown').textContent=c;const tick=setInterval(()=>{$('#countdown').textContent=Math.max(0,--c)},1000);run('getBootstrap').then(b=>{state.bootstrap=b;setTimeout(()=>{clearInterval(tick);$('#loader').classList.add('fade');setTimeout(()=>{$('#loader').classList.add('hidden');$('#app').classList.remove('hidden');renderLogin();},420)},900)}).catch(e=>{view.innerHTML=msg(e.message,true);$('#loader').classList.add('hidden');$('#app').classList.remove('hidden')});}
function shell(title,body){view.innerHTML=`<section class="card"><div class="actions"><button class="tab active" onclick="renderLogin()">Employee Login</button>${state.bootstrap?.isDev?'<button class="tab" onclick="loadDev()">Dev Home</button>':'<button class="tab" onclick="renderUnauthorized()">Dev Home</button>'}<button class="tab" onclick="showGuide()">Category Guide</button></div><h2>${title}</h2>${body}</section>`;}
function renderUnauthorized(){shell('Unauthorized',`<div class="grid two"><div>${msg('This Google account is not approved for Dublin Cleaners Dev tools.',true)}<p class="small">Dev access uses the Google account currently signed into Chrome. Sign into Chrome as skhun@dublincleaners.com or ss.sku@protonmail.com, then reload this page. Employee expense access remains available through first name and PIN login.</p></div><img style="max-width:220px" src="${state.bootstrap.logoUrl}"></div>`)}
function renderLogin(){shell('Employee Login',`<p class="small">Employees sign in with first name and a 4-digit PIN. PINs are verified server-side against salted hashes.</p><form id="login" class="grid"><input name="firstName" placeholder="First name" autocomplete="given-name" required><input name="pin" placeholder="4-digit PIN" inputmode="numeric" maxlength="4" required><button>View my expenses</button></form><div id="loginMsg"></div>`);$('#login').onsubmit=async e=>{e.preventDefault();$('#loginMsg').innerHTML=msg('Signing in…');try{const r=await run('employeeLogin',e.target.firstName.value,e.target.pin.value);state.session=r.token;state.employee=r.employee;state.month=r.months[0];loadEmployee()}catch(err){$('#loginMsg').innerHTML=msg(err.message,true)}}}
async function loadDev(){if(!state.bootstrap.isDev)return renderUnauthorized();view.innerHTML=msg('Loading Dev workspace…');try{state.dev=await run('getDevDashboard',{});renderDev()}catch(e){view.innerHTML=msg(e.message,true)}}
function asArray(v){return Array.isArray(v)?v:[]}
function renderDev(){const d=state.dev||{};const employees=asArray(d.employees),uploads=asArray(d.uploads),expenses=asArray(d.expenses),months=asArray(d.months);view.innerHTML=`<div class="tabs"><button class="tab active" onclick="renderLogin()">Employee Login</button><button class="tab active">Dev Home</button><button class="tab" onclick="showGuide()">Category Guide</button></div><div class="grid two"><section class="card"><h2>Upload statement</h2><form id="upload" class="grid"><input type="month" name="month" required><input type="file" name="pdf" accept="application/pdf" required><button>Parse PDF</button></form><div id="uploadMsg"></div><h3>Create employee</h3><form id="employeeForm" class="grid"><input name="firstName" placeholder="First name" required><input name="pin" placeholder="Unique 4-digit PIN" maxlength="4" inputmode="numeric" required><button>Create account</button></form><div id="employeeMsg"></div></section><section class="card"><h2>Employees</h2><table><tbody>${employees.map(e=>`<tr><td>${esc(e.firstName)}</td><td class="small">${esc(e.employeeId)}</td></tr>`).join('')||'<tr><td>No employees yet.</td></tr>'}</tbody></table></section></div><section class="card"><h2>Uploads</h2><table><thead><tr><th>Month</th><th>File</th><th>Status</th><th>Rows</th></tr></thead><tbody>${uploads.map(u=>`<tr><td>${esc(u.statementMonth)}</td><td>${esc(u.originalFilename)}</td><td>${esc(u.status)}</td><td>${esc(u.rowCount)}</td></tr>`).join('')||'<tr><td colspan="4">No uploads yet.</td></tr>'}</tbody></table></section><section class="card"><h2>All expenses</h2><div class="row"><select id="monthFilter"><option value="">All months</option>${months.map(m=>`<option>${esc(m)}</option>`).join('')}</select><select id="empFilter"><option value="">All employees</option>${employees.map(e=>`<option value="${esc(e.employeeId)}">${esc(e.firstName)}</option>`).join('')}</select></div><div id="expenseTable">${expenseTable(expenses,true)}</div></section>`;bindDev();}
function expenseTable(rows,admin){rows=asArray(rows);return `<table><thead><tr><th>Date</th><th>Employee</th><th>Description</th><th>Suggestion</th><th>Selected</th><th>Status</th></tr></thead><tbody>${rows.map(x=>`<tr><td>${esc(x.expenseDate)}</td><td>${esc(x.employeeNameRaw)}</td><td>${esc(x.description)}</td><td>${esc(x.suggestedCategory)} — ${x.confidence}%</td><td>${esc(x.selectedCategory||'')}</td><td>${esc(x.status)}</td></tr>`).join('')||'<tr><td colspan="6">No expenses found.</td></tr>'}</tbody></table>`}
function bindDev(){ $('#employeeForm').onsubmit=async e=>{e.preventDefault();$('#employeeMsg').innerHTML=msg('Creating employee…');try{await run('createEmployee',e.target.firstName.value,e.target.pin.value);$('#employeeMsg').innerHTML=msg('Employee created.');loadDev()}catch(err){$('#employeeMsg').innerHTML=msg(err.message,true)}}; $('#upload').onsubmit=e=>{e.preventDefault();const f=e.target.pdf.files[0];if(!f)return;$('#uploadMsg').innerHTML=msg('Reading PDF and sending it securely…');const reader=new FileReader();reader.onload=async()=>{try{const r=await run('uploadStatement',{statementMonth:e.target.month.value,filename:f.name,base64:reader.result.split(',')[1]});$('#uploadMsg').innerHTML=msg(`Upload parsed: ${r.rowCount} expenses.`);loadDev()}catch(err){$('#uploadMsg').innerHTML=msg(err.message,true)}};reader.readAsDataURL(f)}; async function filter(){state.dev=await run('getDevDashboard',{month:$('#monthFilter').value,employeeId:$('#empFilter').value})||{};$('#expenseTable').innerHTML=expenseTable(state.dev.expenses,true)} $('#monthFilter').onchange=filter;$('#empFilter').onchange=filter;}
async function loadEmployee(){view.innerHTML=msg('Loading your expenses…');try{const r=await run('getEmployeeExpenses',state.session,state.month);state.employeeData=r;state.month=r.month;renderEmployee()}catch(e){view.innerHTML=msg(e.message,true)}}
function renderEmployee(){const r=state.employeeData;view.innerHTML=`<div class="tabs"><button class="tab active">My Expenses</button><button class="tab" onclick="showGuide()">Category Guide</button><button class="tab" onclick="renderLogin()">Log out</button></div><section class="card"><h2>${esc(r.employee.firstName)}’s expenses</h2><select id="empMonth">${r.months.map(m=>`<option ${m===r.month?'selected':''}>${m}</option>`).join('')}</select><div class="grid">${r.expenses.map(expCard).join('')||'<p>No expenses assigned for this month.</p>'}</div></section>`;$('#empMonth').onchange=e=>{state.month=e.target.value;loadEmployee()};document.querySelectorAll('[data-ai]').forEach(b=>b.onclick=()=>{const id=b.dataset.ai;document.querySelector(`[data-cat="${id}"]`).value=b.dataset.suggest});document.querySelectorAll('[data-save]').forEach(b=>b.onclick=async()=>{const id=b.dataset.save;const val=document.querySelector(`[data-cat="${id}"]`).value;b.textContent='Saving…';try{await run('saveExpenseCategory',state.session,id,val);b.textContent='Saved';setTimeout(loadEmployee,500)}catch(e){alert(e.message);b.textContent='Save category'}})}
function expCard(e){return `<div class="card expense"><div><span class="pill">${esc(e.expenseDate)}</span> <span class="pill">${esc(e.suggestedCategory)} — ${e.confidence}% likely</span></div><strong>${esc(e.description)}</strong><select data-cat="${e.expenseId}">${options(state.bootstrap.categories,e.selectedCategory||e.suggestedCategory)}</select><div class="actions"><button class="secondary" data-ai="${e.expenseId}" data-suggest="${esc(e.suggestedCategory)}">AI Categorize</button><button data-save="${e.expenseId}">Save category</button></div><span class="small">Status: ${esc(e.status)}</span></div>`}
function showGuide(){const cats=state.bootstrap.categories.map(c=>`<li><strong>${esc(c)}</strong><br><span class="small">Guidance for ${esc(c)} can be expanded by finance policy owners.</span></li>`).join('');document.body.insertAdjacentHTML('beforeend',`<div class="modal" onclick="this.remove()"><div onclick="event.stopPropagation()"><div class="actions"><button class="secondary" onclick="this.closest('.modal').remove()">Close</button></div><h2>Category Guide</h2><ul class="category-list">${cats}</ul></div></div>`)}
$('#primaryCta').onclick=()=>state.bootstrap?.isDev?loadDev():renderLogin();boot();
</script>
