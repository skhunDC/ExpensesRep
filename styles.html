<style>
:root{--green:#0f5132;--gold:#d7a441;--ink:#18221d;--muted:#68746d;--bg:#f7faf8;--card:#fff;--line:#dfe7e2;--danger:#b42318;--ok:#16803c;--shadow:0 18px 50px rgba(15,81,50,.12);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink)}button,input,select{font:inherit}button{border:0;border-radius:14px;background:var(--green);color:white;padding:13px 16px;min-height:46px;font-weight:800;cursor:pointer;transition:.18s}button:hover{filter:brightness(1.08);transform:translateY(-1px)}button.secondary{background:#eef5f0;color:var(--green)}button.warn{background:var(--danger)}input,select{width:100%;border:1px solid var(--line);border-radius:13px;padding:13px;background:white;min-height:46px}.hidden{display:none!important}.loader{position:fixed;inset:0;display:grid;place-content:center;text-align:center;background:linear-gradient(150deg,#fff,#eef8f1);z-index:10;transition:opacity .45s ease}.loader.fade{opacity:0}.loader img{width:170px;margin:auto}.loader h2{color:var(--green);margin:22px 0 6px}.loader p{color:var(--muted)}.app{max-width:1180px;margin:0 auto;padding:18px}.hero{display:grid;gap:18px;align-items:center;padding:22px 0 14px}.hero img{width:128px}.hero h1{font-size:clamp(2rem,8vw,4rem);line-height:.98;margin:0;color:var(--green)}.hero p{font-size:1.05rem;color:var(--muted);max-width:720px}.grid{display:grid;gap:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:var(--shadow)}.row{display:grid;gap:10px}.actions{display:flex;gap:10px;flex-wrap:wrap}.tabs{display:flex;gap:8px;overflow:auto;margin:10px 0}.tab{background:white;color:var(--green);border:1px solid var(--line)}.tab.active{background:var(--green);color:white}.msg{padding:12px;border-radius:13px;background:#eef5f0;color:var(--green);margin:10px 0}.err{background:#fff1f0;color:var(--danger)}table{width:100%;border-collapse:collapse;font-size:.92rem}th,td{text-align:left;border-bottom:1px solid var(--line);padding:10px;vertical-align:top}.expense{display:grid;gap:10px}.pill{display:inline-flex;border-radius:999px;padding:5px 9px;background:#f1f6f3;color:var(--green);font-weight:700;font-size:.82rem}.modal{position:fixed;inset:0;background:rgba(0,0,0,.35);display:grid;place-items:end;z-index:5}.modal>div{background:white;width:100%;max-height:82vh;overflow:auto;border-radius:24px 24px 0 0;padding:18px}.category-list{columns:1}.small{color:var(--muted);font-size:.9rem}@media(min-width:800px){.hero{grid-template-columns:180px 1fr}.grid.two{grid-template-columns:360px 1fr}.grid.three{grid-template-columns:repeat(3,1fr)}.row{grid-template-columns:1fr 1fr}.modal{place-items:center}.modal>div{max-width:760px;border-radius:24px}.category-list{columns:2}}
</style>
